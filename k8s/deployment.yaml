apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: webapp
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: LOAD_BALANCER_URL
              valueFrom:
                configMapKeyRef:
                  name: loadbalancer-config
                  key: LOAD_BALANCER_URL
---
apiVersion: v1
kind: Service
metadata:
  name: doggy-webapp
  namespace: default
spec:
  selector:
    app: webapp
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP