<div class="cal-page">

  <!-- Top Bar -->
  <div class="cal-topbar">
    <button class="btn btn-secondary btn-sm" [routerLink]="['/dog-profile', dogId]">← Back to Profile</button>
    <h4 class="mb-0">{{ profileDog?.name }}'s Calendar</h4>
  </div>

  <!-- Week Navigation -->
  <div class="cal-nav">
    <button class="btn btn-outline-primary btn-sm" (click)="previousWeek()">◀</button>
    <span class="cal-range">{{ weekDays[0] | date:'MMM d' }} – {{ weekDays[6] | date:'MMM d, y' }}</span>
    <button class="btn btn-outline-primary btn-sm" (click)="nextWeek()">▶</button>
  </div>

  <!-- Grid -->
  <div class="cal-grid">
    <div class="time-col">
      <div class="day-header-spacer"></div>
      <div *ngFor="let h of hours" class="time-cell">{{ h }}:00</div>
    </div>
    <div class="day-col" *ngFor="let day of weekDays">
      <div class="day-header">{{ day | date:'EEE d' }}</div>
      <div class="hour-cells">
        <div *ngFor="let h of hours" class="hour-cell"></div>
        <div *ngFor="let ev of events"
             class="cal-event"
             [ngStyle]="getEventStyle(ev, day)"
             (click)="openEventDetails(ev)">
          {{ ev.event }}
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Floating Add Button -->
<button *ngIf="!isOrg" class="add-fab" (click)="openAddEventForm()">+ Event</button>

<!-- Create Event Modal -->
<app-create-event-modal
  *ngIf="showAddEventForm"
  [dogId]="dogId"
  [profileDog]="profileDog"
  [rooms]="rooms"
  [allDogs]="allDogs"
  (eventCreated)="onEventCreated()"
  (closed)="closeAddEventForm()">
</app-create-event-modal>

<!-- Event Detail Modal -->
<app-event-detail-modal
  *ngIf="selectedEvent"
  [event]="selectedEvent"
  [currentUser]="currentUser"
  [rooms]="rooms"
  [allDogs]="allDogs"
  (eventUpdated)="onEventUpdated($event)"
  (eventDeleted)="onEventDeleted($event)"
  (closed)="closeEventDetails()">
</app-event-detail-modal>
