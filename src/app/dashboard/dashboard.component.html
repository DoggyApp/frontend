<!-- Top Bar -->
<div class="bg-primary text-white d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
  <h3 class="mb-0">My Dogs</h3>
  <div class="d-flex gap-2">
    <button class="btn btn-light rounded-pill px-4 py-2" routerLink="/user-profile">My Profile</button>
    <button class="btn btn-light rounded-pill px-4 py-2" routerLink="/user-calendar">Calendar</button>
    <button class="btn btn-outline-light rounded-pill px-4 py-2" (click)="logout()">Logout</button>
  </div>
</div>


<!-- Dogs List -->
<div class="container mt-4">
  <div class="dog-bubble d-flex align-items-center mb-3 p-3 rounded-4 shadow-sm" *ngFor="let dog of dogs">
    
    <!-- Dog Picture -->
    <a [routerLink]="['/profile', dog.id]">
      <img [src]="dog.image" alt="{{dog.name}}" class="dog-img me-3">
    </a>

    <!-- Dog Info -->
    <div class="dog-info">
      <h5 class="mb-1">{{ dog.name }}</h5>
      <p class="mb-0 text-muted">{{ dog.age }} • {{ dog.breed }}</p>
    </div>

  </div>
</div>

<!-- FLOATING ADD DOG BUTTON -->
<button
  class="add-dog-fab shadow-lg"
  routerLink="/add-dog"
>
  + Add Dog
</button>
