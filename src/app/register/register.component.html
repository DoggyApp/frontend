<div class="register-wrapper d-flex justify-content-center align-items-center">

  <div class="register-bubble text-center p-5 rounded-4 shadow-lg">

    <h2 class="mb-4 text-white fw-bold">Create Account</h2>

    <!-- Error message -->
    <p *ngIf="registerError" class="register-error">
      {{ registerError }}
    </p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="mb-3">
        <input
          type="text"
          placeholder="Organization Name"
          [(ngModel)]="organization.name"
          name="name"
          required
          class="form-control form-control-lg rounded-pill"
        />
      </div>

      <div class="mb-3">
        <input
          type="email"
          placeholder="Email"
          [(ngModel)]="organization.email"
          name="email"
          required
          class="form-control form-control-lg rounded-pill"
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="organization.password"
          name="password"
          required
          class="form-control form-control-lg rounded-pill"
        />
      </div>

      <div class="mb-4">
        <input
          type="password"
          placeholder="Confirm Password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          class="form-control form-control-lg rounded-pill"
        />
      </div>

      <button
        type="submit"
        [disabled]="!registerForm.valid"
        class="btn btn-light btn-lg rounded-pill w-100 fw-bold mb-3"
      >
        Sign Up
      </button>

      <button
        type="button"
        class="btn btn-outline-light btn-lg rounded-pill w-100"
        routerLink="/org-login"
      >
        Go to Sign In
      </button>

    </form>

    <p class="mt-4 text-white">
      Already have an account?
      <a routerLink="/org-login" class="text-light fw-bold">Login</a>
    </p>

  </div>

</div>
