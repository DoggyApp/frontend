<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="register-bubble d-flex flex-column align-items-center p-5 rounded-4 shadow-lg">

    <h2 class="text-white mb-1">Create Account</h2>
    <p class="text-white-50 small mb-4">Join and manage your dogs</p>

    <p *ngIf="submitError" class="form-error mb-3">{{ submitError }}</p>

    <form (ngSubmit)="onRegister()" class="w-100">

      <div class="d-flex gap-2 mb-3">
        <input type="text" placeholder="First Name" [(ngModel)]="firstName" name="firstName" required
               class="form-control form-control-lg rounded-pill text-muted" />
        <input type="text" placeholder="Last Name" [(ngModel)]="lastName" name="lastName" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <input type="text" placeholder="Phone Number" [(ngModel)]="phoneNumber" name="phoneNumber" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <label class="text-white small mb-1 ps-2">Date of Birth</label>
        <input type="date" [(ngModel)]="birthday" name="birthday" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <!-- Address — Google Places autocomplete -->
      <div class="mb-1">
        <label class="text-white small mb-1 ps-2">Home Address</label>
        <div #autocompleteContainer class="autocomplete-container"></div>
        <p *ngIf="address" class="text-white-50 small ps-2 mt-1 mb-0">✓ {{ address }}</p>
      </div>

      <!-- Handle field -->
      <div class="mb-1 mt-3 position-relative">
        <div class="handle-input-wrap">
          <span class="at-sign">&#64;</span>
          <input type="text" placeholder="choose a handle" [(ngModel)]="handle" name="handle"
                 (input)="onHandleInput()" maxlength="30"
                 class="form-control form-control-lg rounded-pill text-muted handle-input" />
        </div>
      </div>
      <div class="handle-feedback mb-4">
        <span *ngIf="handleChecking" class="text-white-50 small">Checking…</span>
        <span *ngIf="!handleChecking && handle.length >= 3 && handleValid" class="text-success-light small">✓ &#64;{{ handle }} is available</span>
        <span *ngIf="!handleChecking && handleTaken" class="text-danger-light small">✗ &#64;{{ handle }} is already taken</span>
        <span *ngIf="!handleChecking && handle.length > 0 && handle.length < 3" class="text-white-50 small">Handle must be at least 3 characters</span>
      </div>

      <button type="submit" [disabled]="!isFormValid()"
              class="btn btn-light btn-lg rounded-pill w-100">
        Create Account
      </button>
    </form>

    <p class="mt-3 text-white text-center w-100">
      Already have an account?
      <a routerLink="/owner-login" class="text-light fw-bold">Sign In</a>
    </p>
    <p class="mt-1 text-white text-center w-100">
      <a routerLink="/" class="text-light fw-bold">← Back to Home</a>
    </p>

  </div>
</div>
