<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="register-bubble d-flex flex-column align-items-center p-5 rounded-4 shadow-lg">

    <h2 class="text-white mb-1">Register Organization</h2>
    <p class="text-white-50 small mb-4">Create an account to manage your organization</p>

    <p *ngIf="submitError" class="form-error mb-3">{{ submitError }}</p>

    <form (ngSubmit)="onRegister()" class="w-100">

      <div class="mb-3">
        <input type="text" placeholder="Organization Name" [(ngModel)]="name" name="name" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <input type="text" placeholder="Title (e.g. Dog Daycare, Vet Clinic)" [(ngModel)]="title" name="title"
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-3">
        <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>

      <div class="mb-4">
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required
               appPasswordStrength #pw="ngModel"
               class="form-control form-control-lg rounded-pill text-muted" />
        <div *ngIf="pw.dirty && pw.errors" class="mt-1 ps-2">
          <small *ngIf="pw.errors?.['minLength']" class="d-block text-danger-light">✗ Must be at least 8 characters</small>
          <small *ngIf="pw.errors?.['tooWeak'] as msg" class="d-block text-danger-light">✗ Password is too easy to guess — {{ msg }}</small>
        </div>
      </div>

      <button type="submit" [disabled]="!isFormValid()"
              class="btn btn-light btn-lg rounded-pill w-100">
        Create Organization
      </button>
    </form>

    <p class="mt-3 text-white text-center w-100">
      Already have an account?
      <a routerLink="/org-login" class="text-light fw-bold">Sign In</a>
    </p>
    <p class="mt-1 text-white text-center w-100">
      <a routerLink="/" class="text-light fw-bold">← Back to Home</a>
    </p>

  </div>
</div>
