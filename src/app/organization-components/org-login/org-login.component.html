<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
  <div class="login-bubble d-flex flex-column align-items-center p-5 rounded-4 shadow-lg">

    <h2 class="text-white mb-1">Organization Login</h2>
    <p class="text-white-50 small mb-4">Sign in to manage your organization</p>

    <p *ngIf="loginError" class="login-error mb-3">Invalid email or password</p>

    <form (ngSubmit)="onLogin()" class="w-100">
      <div class="mb-3">
        <input type="email" placeholder="Email" [(ngModel)]="email" name="email" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>
      <div class="mb-4">
        <input type="password" placeholder="Password" [(ngModel)]="password" name="password" required
               class="form-control form-control-lg rounded-pill text-muted" />
      </div>
      <button type="submit" class="btn btn-light btn-lg rounded-pill w-100">Login</button>
    </form>

    <p class="mt-3 text-white text-center w-100">
      Don't have an account?
      <a routerLink="/org-register" class="text-light fw-bold">Sign Up</a>
    </p>
    <p class="mt-1 text-white text-center w-100">
      <a routerLink="/" class="text-light fw-bold">← Back to Home</a>
    </p>

  </div>
</div>
