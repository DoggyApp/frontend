<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
  <!-- Login Bubble -->
  <div class="login-bubble d-flex flex-column align-items-center p-5 rounded-4 shadow-lg">

    <h2 class="text-white mb-4">Login</h2>

    <!-- Error Message -->
    <p *ngIf="loginError" class="login-error mb-3">
      Invalid email or password
    </p>

    <!-- Login Form -->
    <form (ngSubmit)="onLogin()" class="w-100">
      <div class="mb-3">
        <input
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
          class="form-control form-control-lg rounded-pill text-muted"
        />
      </div>

      <div class="mb-4">
        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="password"
          name="password"
          required
          class="form-control form-control-lg rounded-pill text-muted"
        />
      </div>

      <button type="submit" class="btn btn-light btn-lg rounded-pill w-100">
        Login
      </button>
    </form>

    <p class="mt-3 text-white text-center w-100">
      Don't have an account? 
      <a routerLink="/register" class="text-light fw-bold">Sign Up</a>
    </p>
    
  </div>
</div>
