<!-- Top Bar -->
<div class="bg-primary text-white d-flex justify-content-between align-items-center px-4 py-3 shadow-sm">
  <h3 class="mb-0">My Organization</h3>
  <div class="d-flex gap-2">
    <button class="btn btn-light rounded-pill px-4 py-2" routerLink="/schedule">Schedule</button>
    <button class="btn btn-outline-light rounded-pill px-4 py-2" (click)="logout()">Logout</button>
  </div>
</div>

<!-- Tabs -->
<div class="container mt-4">
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'dogs'" (click)="setTab('dogs')">
        Dogs
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTab === 'employees'" (click)="setTab('employees')">
        Employees
      </button>
    </li>
  </ul>

  <!-- Dogs Tab -->
  <div *ngIf="activeTab === 'dogs'" class="row g-3">
    <div class="col-sm-6 col-md-4 col-lg-3" *ngFor="let dog of dogs">
      <app-dog-card [dog]="dog"></app-dog-card>
      <button class="btn btn-outline-danger btn-sm rounded-pill w-100 mt-1" (click)="deleteDog(dog.id)">
        Remove Dog
      </button>
    </div>
    <p *ngIf="dogs.length === 0" class="text-muted">No dogs yet.</p>
  </div>

  <!-- Employees Tab -->
  <div *ngIf="activeTab === 'employees'" class="row g-3">
    <div class="col-sm-6 col-md-4 col-lg-3" *ngFor="let employee of employees">
      <div class="employee-card p-3 rounded-4 shadow-sm text-center">
        <div class="employee-avatar mb-2">
          {{ employee.firstName[0] }}{{ employee.lastName[0] }}
        </div>
        <h5 class="mb-1">{{ employee.firstName }} {{ employee.lastName }}</h5>
        <p class="mb-1 text-muted small">{{ employee.email }}</p>
        <button class="btn btn-outline-danger btn-sm rounded-pill" (click)="deleteEmployee(employee.id)">
          Remove
        </button>
      </div>
    </div>
    <p *ngIf="employees.length === 0" class="text-muted">No employees yet.</p>
  </div>
</div>

<!-- Add Employee Modal -->
<div class="modal-overlay" *ngIf="showAddEmployeeForm">
  <div class="modal-bubble p-4 rounded-4 shadow-lg">
    <h5 class="mb-3 fw-bold">Add Employee</h5>

    <form (ngSubmit)="submitAddEmployee()" #addEmployeeForm="ngForm">
      <div class="mb-3">
        <input
          type="text"
          placeholder="First Name"
          [(ngModel)]="newEmployee.firstName"
          name="firstName"
          required
          class="form-control rounded-pill"
        />
      </div>
      <div class="mb-3">
        <input
          type="text"
          placeholder="Last Name"
          [(ngModel)]="newEmployee.lastName"
          name="lastName"
          required
          class="form-control rounded-pill"
        />
      </div>
      <div class="mb-3">
        <input
          type="email"
          placeholder="Email"
          [(ngModel)]="newEmployee.email"
          name="email"
          required
          class="form-control rounded-pill"
        />
      </div>
      <div class="mb-4">
        <input
          type="password"
          placeholder="Password"
          [(ngModel)]="newEmployee.password"
          name="password"
          required
          class="form-control rounded-pill"
        />
      </div>

      <div class="d-flex gap-2">
        <button type="submit" [disabled]="!addEmployeeForm.valid" class="btn btn-primary rounded-pill flex-grow-1">
          Add
        </button>
        <button type="button" class="btn btn-outline-secondary rounded-pill flex-grow-1" (click)="closeAddEmployeeModal()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Floating Action Buttons -->
<div class="fab-stack">
  <button class="add-fab shadow-lg" (click)="openAddEmployeeModal()">+ Add Employee</button>
  <button class="add-fab shadow-lg" routerLink="/add-dog">+ Add Dog</button>
</div>
